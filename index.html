<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrixCarburant — Trouvez le carburant le moins cher près de vous</title>
  <meta name="description" content="Trouvez le carburant le moins cher près de vous. Prix en direct mis à jour régulièrement depuis les données officielles du gouvernement français."/>
  <meta name="theme-color" content="#1a73e8"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    :root{
      --blue:#1a73e8;--blue-light:#e8f0fe;--blue-dark:#0d47a1;
      --green:#1e8c45;--green-light:#e6f4ea;
      --amber:#f59c00;--amber-light:#fef7e0;
      --red:#d93025;--red-light:#fce8e6;
      --gray:#5f6368;--border:#e0e0e0;--bg:#f8f9fa;
      --white:#ffffff;--text:#202124;--text2:#5f6368
    }
    body{background:var(--bg);min-height:100vh}
    .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}

    /* HEADER */
    .header{background:var(--blue);padding:14px 16px;position:sticky;top:0;z-index:100}
    .logo-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .logo-icon{width:30px;height:30px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px}
    .logo-text{color:white;font-size:19px;font-weight:700;letter-spacing:-0.4px;flex:1}
    .live-pill{background:rgba(255,255,255,0.2);color:white;font-size:11px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
    .live-dot{width:6px;height:6px;background:#4cff82;border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .search-box{background:white;border-radius:10px;display:flex;align-items:center;padding:0 10px;gap:8px}
    .search-box input{flex:1;border:none;outline:none;padding:12px 4px;font-size:15px;color:var(--text);background:transparent}
    .search-box input::placeholder{color:#bbb}
    .loc-btn{background:var(--blue-light);border:none;border-radius:7px;padding:8px 10px;cursor:pointer;font-size:12px;color:var(--blue);font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:background 0.15s}
    .loc-btn:hover{background:#d2e3fc}
    .loc-btn.loading-loc{opacity:0.7;cursor:wait}

    /* FUEL TABS */
    .fuel-tabs{display:flex;background:white;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:108px;z-index:99}
    .fuel-tabs::-webkit-scrollbar{display:none}
    .ftab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--gray);border:none;background:transparent;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.15s}
    .ftab.on{color:var(--blue);border-bottom:3px solid var(--blue)}

    /* STATS BAR */
    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:white;border-bottom:1px solid var(--border)}
    .stat{padding:10px 12px;text-align:center;border-right:1px solid var(--border)}
    .stat:last-child{border-right:none}
    .stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
    .stat-val{font-size:17px;font-weight:700;color:var(--text)}
    .stat-val.green{color:var(--green)}

    /* UPDATED BAR */
    .updated-bar{background:#f0f7ff;border-bottom:1px solid #c5daf6;padding:7px 14px;font-size:11px;color:#185fa5;display:flex;align-items:center;justify-content:space-between}

    /* SORT BAR */
    .sort-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:white;border-bottom:1px solid var(--border)}
    .sort-bar span{font-size:12px;color:var(--text2);font-weight:500}
    .sort-bar select{font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:white;color:var(--text);cursor:pointer;outline:none}

    /* STATION CARDS */
    .list{flex:1;padding:6px 0 24px}
    .card{background:white;margin:6px 10px;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
    .card:hover{box-shadow:0 2px 12px rgba(26,115,232,0.12);border-color:#b3c9f0}
    .card.best{border:2px solid var(--green)}
    .card.selected{border:2px solid var(--blue)}
    .card-top{display:flex;align-items:center;gap:12px;padding:14px}
    .brand-logo{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:-0.3px}
    .card-info{flex:1;min-width:0}
    .card-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .best-badge{background:var(--green-light);color:var(--green);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;flex-shrink:0}
    .card-addr{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-dist{font-size:11px;color:#bbb;margin-top:2px}
    .price-col{text-align:right;flex-shrink:0}
    .price-big{font-size:27px;font-weight:700;line-height:1}
    .price-unit{font-size:11px;color:var(--text2)}
    .save-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-top:3px;display:inline-block;background:var(--green-light);color:var(--green)}

    /* DETAIL PANEL */
    .card-detail{border-top:1px solid var(--border);padding:14px;background:#fafbff}
    .all-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
    .fp{background:white;border:1px solid var(--border);border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s}
    .fp:hover:not(.fp-disabled){border-color:#b3c9f0;background:#f4f8ff}
    .fp.active{border-color:var(--blue);background:var(--blue-light)}
    .fp.fp-disabled{cursor:default;opacity:0.5}
    .fp-type{font-size:10px;color:var(--text2);margin-bottom:3px}
    .fp-p{font-size:15px;font-weight:700;color:var(--text)}
    .fp.active .fp-p{color:var(--blue)}
    .fp-na{font-size:13px;color:#ccc;margin-top:2px}
    .saving-box{background:var(--green-light);color:var(--green);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:500;margin-bottom:12px}
    .action-btns{display:flex;gap:8px}
    .btn-go{flex:1;background:var(--blue);color:white;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
    .btn-go:hover{background:var(--blue-dark)}
    .btn-save{background:white;border:1px solid var(--border);border-radius:9px;padding:12px 16px;font-size:18px;cursor:pointer;color:var(--gray);transition:all 0.15s}
    .btn-save.saved{color:#e8a000;border-color:#e8a000}

    /* LOADING / ERROR */
    .loading{padding:60px 20px;text-align:center}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{color:var(--text2);font-size:13px;margin-top:6px}
    .error-box{margin:20px;background:white;border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center}
    .error-box h3{color:var(--text);font-size:16px;margin-bottom:8px}
    .error-box p{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:16px}
    .retry-btn{background:var(--blue);color:white;border:none;border-radius:8px;padding:11px 24px;font-size:14px;cursor:pointer;font-weight:600}
    .empty{padding:40px;text-align:center;color:var(--text2);font-size:14px}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:white;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}

    @media(min-width:480px){
      .app{border-left:1px solid var(--border);border-right:1px solid var(--border)}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h2m14 0h2M12 3v2m0 14v2"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
      </div>
      <span class="logo-text">PrixCarburant</span>
      <div class="live-pill"><span class="live-dot"></span> EN DIRECT</div>
    </div>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-in" placeholder="Ville, commune ou code postal..." oninput="doSearch(this.value)" autocomplete="off"/>
      <button class="loc-btn" id="loc-btn" onclick="useMyLocation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
        Près de moi
      </button>
    </div>
  </div>

  <div class="fuel-tabs">
    <button class="ftab on" onclick="setFuel('SP95',this)">SP95</button>
    <button class="ftab" onclick="setFuel('SP98',this)">SP98</button>
    <button class="ftab" onclick="setFuel('E10',this)">E10</button>
    <button class="ftab" onclick="setFuel('E85',this)">E85</button>
    <button class="ftab" onclick="setFuel('B7',this)">Gazole</button>
    <button class="ftab" onclick="setFuel('GPL',this)">GPL</button>
  </div>

  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <strong>Chargement des prix en direct...</strong>
      <p>Récupération des données gouvernementales françaises</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var stations = [];
var currentFuel = 'SP95';
var selectedId = null;
var sortMode = 'price';
var userLat = null, userLng = null;
var favourites = JSON.parse(localStorage.getItem('pf_favs')||'{}');
var searchQ = '';

var BRANDS = {
  'total':{c:'#e31837',bg:'#fde8eb'},'totalenergies':{c:'#e31837',bg:'#fde8eb'},
  'leclerc':{c:'#003da5',bg:'#e6edf8'},'carrefour':{c:'#005bab',bg:'#e6eef8'},
  'intermarche':{c:'#e31837',bg:'#fde8eb'},'auchan':{c:'#e8701a',bg:'#fef0e6'},
  'casino':{c:'#00a037',bg:'#e6f7ed'},'super u':{c:'#005bab',bg:'#e6eef8'},
  'bp':{c:'#006b3f',bg:'#e6f4ee'},'shell':{c:'#d4a000',bg:'#fffbe6'},
  'esso':{c:'#0040a0',bg:'#e6edf8'},'jet':{c:'#e31837',bg:'#fde8eb'},
  'gulf':{c:'#f04e23',bg:'#feeee9'},'texaco':{c:'#e31837',bg:'#fde8eb'},
  'default':{c:'#1a73e8',bg:'#e8f0fe'}
};

function getBrand(name){
  var n=(name||'').toLowerCase();
  for(var k in BRANDS){ if(k!=='default'&&n.includes(k)) return BRANDS[k]; }
  return BRANDS.default;
}
function initials(name){
  var w=(name||'').trim().split(/\s+/);
  return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():(name||'??').slice(0,2).toUpperCase();
}

function dist(lat1,lng1,lat2,lng2){
  var R=6371,a=Math.sin((lat2-lat1)*Math.PI/360)*Math.sin((lat2-lat1)*Math.PI/360)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin((lng2-lng1)*Math.PI/360)*Math.sin((lng2-lng1)*Math.PI/360);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function formatPrice(p){
  if(!p||p<=0) return null;
  return p.toFixed(3)+'€';
}

function resolveStationName(s) {
  var candidates = [s.ensigne, s.ensigne_id, s.nom, s.name, s.brand, s.marque];
  for (var i = 0; i < candidates.length; i++) {
    var v = candidates[i];
    if (v && typeof v === 'string' && v.trim() && !/^\d+$/.test(v.trim())) {
      return v.trim().replace(/\b\w/g, function(c){ return c.toUpperCase(); });
    }
  }
  if (s.ville) return 'Station — ' + s.ville;
  return 'Station';
}

// FIXED: now reads BOTH the flat fields AND the "prix" JSON array
// The API sometimes uses one, sometimes the other, sometimes both
function mapFRPrices(s) {
  var prices = {};

  // Method 1: flat fields like gazole_prix, sp95_prix, etc.
  var flatMap = {gazole_prix:'B7', sp95_prix:'SP95', sp98_prix:'SP98', e10_prix:'E10', e85_prix:'E85', gplc_prix:'GPL'};
  Object.keys(flatMap).forEach(function(k){
    var v = parseFloat(s[k]);
    if(v > 0) prices[flatMap[k]] = v;
  });

  // Method 2: parse the "prix" JSON string array
  // Many stations ONLY have this and the flat fields are null/missing
  if (s.prix) {
    try {
      var prixArr = typeof s.prix === 'string' ? JSON.parse(s.prix) : s.prix;
      var nomMap = {'Gazole':'B7','SP95':'SP95','SP98':'SP98','E10':'E10','E85':'E85','GPLc':'GPL'};
      if (Array.isArray(prixArr)) {
        prixArr.forEach(function(p) {
          var key = nomMap[p['@nom']];
          var val = parseFloat(p['@valeur']);
          if (key && val > 0 && !prices[key]) {
            // Only set if not already set by flat fields (flat fields take priority)
            prices[key] = val;
          }
        });
      }
    } catch(e) {
      // Silently ignore malformed prix field
    }
  }

  return prices;
}

// FIXED: always prefer geom.lat/lon (always correct GPS),
// only fall back to raw lat/lng if geom is missing
function parseCoords(s) {
  // geom is always reliable GPS coordinates
  if (s.geom && s.geom.lat && s.geom.lon) {
    return { lat: parseFloat(s.geom.lat), lng: parseFloat(s.geom.lon) };
  }
  // Raw lat/lng can be in different formats depending on the station
  var lat = parseFloat(s.latitude || 0);
  var lng = parseFloat(s.longitude || 0);
  // Some stations store coordinates multiplied by 100000 (old format)
  if (Math.abs(lat) > 1000) lat = lat / 100000;
  if (Math.abs(lng) > 1000) lng = lng / 100000;
  return { lat: lat, lng: lng };
}

function parseFRStations(data) {
  var raw = data.stations || [];
  return raw.map(function(s){
    var coords = parseCoords(s);
    var lat = coords.lat;
    var lng = coords.lng;

    if (!lat || !lng) return null;

    var prices = mapFRPrices(s);
    if (!Object.keys(prices).some(function(k){ return prices[k] > 0; })) return null;

    var name = resolveStationName(s);

    return {
      id: 'fr_' + (s.id || Math.random().toString(36).slice(2,8)),
      name: name,
      addr: [s.adresse, s.cp, s.ville].filter(Boolean).join(', ') || '',
      cp: (s.cp || '').toString(),
      ville: (s.ville || '').toLowerCase(),
      lat: lat, lng: lng, prices: prices,
      // Default to 99999 — will be recalculated after fetch
      d: userLat !== null ? dist(userLat, userLng, lat, lng) : 99999
    };
  }).filter(Boolean);
}

function fetchLiveData(){
  var url = '/api/fuel';
  if(userLat !== null && userLng !== null){
    url += '?lat=' + userLat + '&lng=' + userLng;
  }
  return fetch(url)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(payload){
      if(!payload || !Array.isArray(payload.results)){
        throw new Error('Réponse API invalide');
      }
      stations = [];
      payload.results.forEach(function(result){
        if(result.ok && result.data && result.country === 'FR'){
          parseFRStations(result.data).forEach(function(s){
            stations.push(s);
          });
        }
      });
      if(!stations.length){
        throw new Error('Aucune station retournée');
      }
      return payload;
    });
}

function getP(s){return s.prices[currentFuel]||0;}

// FIXED: distance filter is safe — only excludes stations when:
// 1. We have the user's GPS location
// 2. The station has a real calculated distance (not the 99999 default)
function getFiltered(){
  var q = searchQ.toLowerCase().trim();
  var MAX_KM = 15;

  var filtered = stations.filter(function(s){
    if (getP(s) <= 0) return false;

    // Only filter by distance if location is known AND distance is real (not default 99999)
    if (userLat !== null && s.d < 9999 && s.d > MAX_KM) return false;

    if (q) {
      return (s.name||'').toLowerCase().includes(q) ||
             (s.addr||'').toLowerCase().includes(q) ||
             (s.cp||'').includes(q) ||
             (s.ville||'').includes(q);
    }
    return true;
  });

  filtered.sort(function(a,b){
    if(sortMode==='dist'){
      return (a.d||99999)-(b.d||99999);
    }
    return getP(a)-getP(b);
  });
  return filtered;
}

function doSearch(v){searchQ=v;selectedId=null;render();}

function setFuel(f,el){
  currentFuel=f;
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  render();
}

function setSort(v){
  sortMode=v;
  render();
}

function switchFuelFromCard(fuelKey, event) {
  event.stopPropagation();
  if(!fuelKey) return;
  currentFuel = fuelKey;
  document.querySelectorAll('.ftab').forEach(function(t){
    t.classList.toggle('on', t.textContent.trim() === (fuelKey === 'B7' ? 'Gazole' : fuelKey));
  });
  render();
}

function useMyLocation(){
  if(!navigator.geolocation){
    showToast('Géolocalisation non supportée par ce navigateur');
    return;
  }
  var btn = document.getElementById('loc-btn');
  btn.classList.add('loading-loc');
  btn.textContent = '⏳ Localisation...';

  navigator.geolocation.getCurrentPosition(
    function(pos){
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      btn.classList.remove('loading-loc');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg> Près de moi';

      // Recalculate distances for already-loaded stations
      stations.forEach(function(s){ s.d = dist(userLat, userLng, s.lat, s.lng); });

      reverseGeocode(userLat, userLng, function(label){
        var input = document.getElementById('search-in');
        if(input && label){
          input.value = label;
          searchQ = '';
        }
        showToast('📍 Position trouvée : ' + (label || 'votre position'));
      });

      sortMode = 'dist';
      var sel = document.querySelector('.sort-bar select');
      if(sel) sel.value = 'dist';

      // Reload with user coords so backend applies the 15km geo filter
      fetchLiveData()
        .then(function(){
          stations.forEach(function(s){ s.d = dist(userLat, userLng, s.lat, s.lng); });
          render();
        })
        .catch(function(){
          render();
        });
    },
    function(err){
      btn.classList.remove('loading-loc');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg> Près de moi';

      if(err.code === 1){
        showToast('❌ Accès à la position refusé. Activez la localisation dans les réglages du navigateur.');
      } else if(err.code === 2){
        showToast('❌ Position indisponible. Vérifiez votre GPS.');
      } else {
        showToast('❌ Délai dépassé. Réessayez.');
      }
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function reverseGeocode(lat, lng, cb){
  fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=14&accept-language=fr', {
    headers: { 'Accept-Language': 'fr' }
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var a = data.address || {};
    var label = a.village || a.town || a.city || a.suburb || a.municipality || a.county || '';
    var cp = a.postcode || '';
    var display = [cp, label].filter(Boolean).join(' ');
    cb(display || data.display_name || '');
  })
  .catch(function(){ cb(''); });
}

function toggleCard(id){selectedId=selectedId===id?null:id;render();}

function toggleFav(id,name,e){
  e.stopPropagation();
  if(favourites[id]){delete favourites[id];showToast('Retiré des favoris');}
  else{favourites[id]=name;showToast('Ajouté aux favoris !');}
  localStorage.setItem('pf_favs',JSON.stringify(favourites));
  render();
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}

function render(){
  var list=getFiltered();
  var prices=list.map(function(s){return getP(s);});
  var minP=prices.length?Math.min.apply(null,prices):0;
  var maxP=prices.length?Math.max.apply(null,prices):0;
  var avgP=prices.length?prices.reduce(function(a,b){return a+b;},0)/prices.length:0;

  var html='';

  html+='<div class="updated-bar">';
  html+='<span>&#128197; Mis à jour sous 30 min &nbsp;|&nbsp; '+stations.length.toLocaleString()+' stations chargées</span>';
  html+='<span style="color:#1e8c45;font-weight:600">&#10003; En direct</span>';
  html+='</div>';

  html+='<div class="stats-row">';
  html+='<div class="stat"><div class="stat-label">Le moins cher</div><div class="stat-val green">'+(minP?formatPrice(minP):'—')+'</div></div>';
  html+='<div class="stat"><div class="stat-label">Moyenne</div><div class="stat-val">'+(avgP?formatPrice(avgP):'—')+'</div></div>';
  html+='<div class="stat"><div class="stat-label">Économie max</div><div class="stat-val green">'+(minP&&maxP?(maxP-minP).toFixed(3)+'€':'—')+'</div></div>';
  html+='</div>';

  html+='<div class="sort-bar"><span>'+list.length.toLocaleString()+' stations avec '+currentFuel+'</span>';
  html+='<select onchange="setSort(this.value)">';
  html+='<option value="price"'+(sortMode==='price'?' selected':'')+'>Moins cher d\'abord</option>';
  html+='<option value="dist"'+(sortMode==='dist'?' selected':'')+'>Le plus proche d\'abord</option>';
  html+='</select></div>';

  html+='<div class="list">';
  if(list.length===0){
    html+='<div class="empty">Aucune station trouvée.<br>Essayez une autre recherche ou un autre type de carburant.</div>';
  } else {
    var show=list.slice(0,40);
    show.forEach(function(s,i){
      var p=getP(s);
      var isBest=i===0&&sortMode==='price';
      var isSel=selectedId===s.id;
      var brand=getBrand(s.name);
      var distStr=s.d<100?s.d.toFixed(1):Math.round(s.d);
      var saveVsMax=(maxP-p).toFixed(3);
      var isFav=!!favourites[s.id];

      html+='<div class="card'+(isBest?' best':'')+(isSel?' selected':'')+'" onclick="toggleCard(\''+s.id+'\')">';
      html+='<div class="card-top">';
      html+='<div class="brand-logo" style="background:'+brand.bg+';color:'+brand.c+'">'+initials(s.name)+'</div>';
      html+='<div class="card-info">';
      html+='<div class="card-name">'+escHtml(s.name)+(isBest?'<span class="best-badge">&#9733; Meilleur prix</span>':'')+'</div>';
      if(s.addr) html+='<div class="card-addr">'+escHtml(s.addr)+'</div>';
      if(userLat!==null && s.d < 9999) html+='<div class="card-dist">à '+distStr+' km</div>';
      html+='</div>';
      html+='<div class="price-col">';
      html+='<div class="price-big" style="color:'+(isBest?'#1e8c45':'#202124')+'">'+formatPrice(p)+'</div>';
      html+='<div class="price-unit">/litre</div>';
      if(parseFloat(saveVsMax)>0.001) html+='<div class="save-tag">Économisez '+saveVsMax+'€</div>';
      html+='</div></div>';

      if(isSel){
        html+='<div class="card-detail">';
        html+='<div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Tous les prix à cette station</div>';
        html+='<div class="all-prices">';
        [{k:'SP95',l:'SP95'},{k:'SP98',l:'SP98'},{k:'E10',l:'E10'},{k:'E85',l:'E85'},{k:'B7',l:'Gazole'},{k:'GPL',l:'GPL'}].forEach(function(f){
          var fp=s.prices[f.k];
          var hasPrice = fp && fp > 0;
          var isActive = f.k === currentFuel;
          var cls = 'fp' + (isActive?' active':'') + (hasPrice?'':' fp-disabled');
          var clickAttr = hasPrice ? ' onclick="switchFuelFromCard(\''+f.k+'\',event)"' : '';
          html+='<div class="'+cls+'"'+clickAttr+'>';
          html+='<div class="fp-type">'+f.l+'</div>';
          html+=hasPrice?'<div class="fp-p">'+formatPrice(fp)+'</div>':'<div class="fp-na">—</div>';
          html+='</div>';
        });
        html+='</div>';
        var tankSave=(parseFloat(saveVsMax)*50).toFixed(2);
        if(parseFloat(saveVsMax)>0.001) html+='<div class="saving-box">&#127381; Faire le plein ici (50L) vs le plus cher proche : <strong>économisez '+tankSave+'€</strong></div>';
        html+='<div class="action-btns">';
        html+='<a class="btn-go" href="https://www.google.com/maps/search/'+encodeURIComponent((s.name||'')+' '+(s.addr||''))+'" target="_blank" onclick="event.stopPropagation()">&#128205; Y aller</a>';
        html+='<button class="btn-save'+(isFav?' saved':'')+'" onclick="toggleFav(\''+s.id+'\',\''+escAttr(s.name)+'\',event)">'+(isFav?'&#9733;':'&#9734;')+'</button>';
        html+='</div></div>';
      }
      html+='</div>';
    });
    if(list.length>40) html+='<div style="text-align:center;padding:16px;font-size:12px;color:var(--text2)">Affichage de 40 sur '+list.length.toLocaleString()+' — affinez avec la recherche</div>';
  }
  html+='</div>';
  document.getElementById('root').innerHTML=html;
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return (s||'').replace(/'/g,'\\\''); }

function showError(){
  document.getElementById('root').innerHTML='<div class="error-box">'+
    '<h3>&#128267; Impossible de charger les données en direct</h3>'+
    '<p>Nous n\'avons pas pu récupérer les prix du carburant en ce moment. Cela signifie généralement que le flux de données est temporairement indisponible.<br><br>Veuillez actualiser et réessayer dans un instant.</p>'+
    '<button class="retry-btn" onclick="loadDemo()">&#128200; Aperçu avec données de démonstration</button>'+
    '</div>';
}

function loadDemo(){
  stations=[
    {id:'d1',name:'Leclerc',addr:'12 Rue du Commerce, 75015 Paris',cp:'75015',ville:'paris',lat:48.841,lng:2.290,prices:{SP95:1.759,SP98:1.839,E10:1.719,B7:1.699,E85:0.899,GPL:0},d:0.3},
    {id:'d2',name:'Intermarché',addr:'45 Avenue Victor Hugo, 69003 Lyon',cp:'69003',ville:'lyon',lat:45.757,lng:4.834,prices:{SP95:1.779,SP98:1.859,E10:1.739,B7:1.719,E85:0.929,GPL:0},d:0.7},
    {id:'d3',name:'Total',addr:'8 Boulevard Gambetta, 33000 Bordeaux',cp:'33000',ville:'bordeaux',lat:44.837,lng:-0.580,prices:{SP95:1.829,SP98:1.929,E10:1.789,B7:1.769,E85:0,GPL:0.959},d:1.1},
  ];
  render();
}

function init(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        sortMode = 'dist';
        fetchLiveData()
          .then(function(){
            stations.forEach(function(s){ s.d = dist(userLat, userLng, s.lat, s.lng); });
            render();
          })
          .catch(function(err){
            console.error('Données carburant en direct échouées:', err);
            showError();
          });
      },
      function(){
        fetchLiveData()
          .then(function(){ render(); })
          .catch(function(err){
            console.error('Données carburant en direct échouées:', err);
            showError();
          });
      },
      { timeout: 5000, maximumAge: 300000 }
    );
  } else {
    fetchLiveData()
      .then(function(){ render(); })
      .catch(function(err){
        console.error('Données carburant en direct échouées:', err);
        showError();
      });
  }
}

init();
</script>
</body>
</html>
